name: Push to Replicate

on:
  push:
    branches:
      - main

jobs:
  push-to-replicate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      # 装新版 cog（v0.20.0 的 manifest 格式 Replicate registry 才接受），但不传 token，
      # 避免触发 cog login 对 CLI-auth-token 的格式校验
      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          cog-version: v0.20.0

      # 绕过 cog login：直接用 API token 做 docker registry 认证（r8.im 接受 API token），
      # cog push 复用 docker 的登录态
      - name: Docker login to r8.im
        run: echo "${{ secrets.REPLICATE_API_TOKEN }}" | docker login r8.im -u xaoyaozi --password-stdin

      - name: Push to Replicate
        run: cog push r8.im/xaoyaozi/propainter
